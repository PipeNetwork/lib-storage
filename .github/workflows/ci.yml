name: SDK CI

on:
  push:
  pull_request:

jobs:
  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check SDK versions stay aligned
        run: python scripts/check_versions.py

  typescript:
    runs-on: ubuntu-latest
    needs: version-sync
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: typescript/package-lock.json
      - name: Build TypeScript SDK
        run: |
          npm ci
          npm run build
          npx tsc -p tsconfig.json --noEmit
      - name: Run unit tests
        run: node --test tests/test_client.mjs

  python:
    runs-on: ubuntu-latest
    needs: version-sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate Python SDK
        run: |
          python -m py_compile \
            python/src/pipe_storage/client.py \
            python/src/pipe_storage/frameworks.py \
            python/src/pipe_storage/__init__.py \
            python/tests/integration_test.py \
            python/tests/test_client.py \
            python/examples/openai_tool.py \
            python/examples/autogen_tools.py \
            python/examples/crewai_tools.py \
            quickstart/python_agent.py
      - name: Run unit tests
        run: python -m unittest python.tests.test_client -v
      - name: Run mocked integration-flow test
        run: python python/tests/integration_test.py

  rust:
    runs-on: ubuntu-latest
    needs: version-sync
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Rust SDK
        run: |
          cargo fmt --manifest-path rust/Cargo.toml --check
          cargo check --manifest-path rust/Cargo.toml
          cargo test --manifest-path rust/Cargo.toml --test test_client -- --nocapture
